<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fav-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e53e4e"/>
      <stop offset="50%" stop-color="#c8102e"/>
      <stop offset="100%" stop-color="#8a0a1f"/>
    </linearGradient>
  </defs>
  <circle cx="16" cy="16" r="15.5" fill="#1c1d20" stroke="url(#fav-red)" stroke-width="1.2"/>
  <!-- Crown -->
  <polygon points="16,3 13,7.5 15,6.5 16,9 17,6.5 19,7.5" fill="url(#fav-red)"/>
  <!-- Left laurel -->
  <ellipse cx="5.5" cy="14" rx="3" ry="1.2" transform="rotate(-30,5.5,14)" fill="url(#fav-red)" opacity="0.8"/>
  <ellipse cx="4.5" cy="18" rx="3" ry="1.2" transform="rotate(-18,4.5,18)" fill="url(#fav-red)" opacity="0.65"/>
  <!-- Right laurel -->
  <ellipse cx="26.5" cy="14" rx="3" ry="1.2" transform="rotate(30,26.5,14)" fill="url(#fav-red)" opacity="0.8"/>
  <ellipse cx="27.5" cy="18" rx="3" ry="1.2" transform="rotate(18,27.5,18)" fill="url(#fav-red)" opacity="0.65"/>
  <!-- N lettermark -->
  <text x="16" y="25" font-family="Georgia,serif" font-size="16" font-weight="700" fill="#ececef" text-anchor="middle">N</text>
</svg>
